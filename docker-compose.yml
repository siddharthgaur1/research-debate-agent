name: research-debate-agent

services:
  redis:
    image: redis/redis-stack-server:7.4.0-v1
    # redis-stack, not plain redis: LangGraph's RedisSaver builds RediSearch
    # indices for checkpoint queries, which vanilla Redis doesn't ship.
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  chroma:
    image: chromadb/chroma:0.5.20
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DB_PATH: /app/data/runs.db
      RUNS_DIR: /app/runs
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      # History and reports outlive the container: a PDF you can't retrieve after
      # a restart isn't an export.
      - runs_data:/app/runs
      - db_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  chroma_data:
  runs_data:
  db_data:
